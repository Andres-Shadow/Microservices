openapi: "3.0.1"
info:
  title: "API Documentation"
  description: "User jwt vaildation"
  version: "1.0.0"
servers:
  - url: http://localhot:9090/api/v1/user

tags:
  - name: user
    description: "User that can access to the system"
paths:
  /users:
    get:
      security:
        - BearerAuth: []
      tags:
        - user
      summary: "Get all users"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserBodyGet"
            
        required: true
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/UserSuccesGetAll"
        "403":
          description: "Forbidden"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnSuccess"
        "404":
          description: "Not Found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnSuccess"
  /newUser:
    post:
      security:
        - BearerAuth: []
      tags:
        - user
      summary: "Add an user"
      parameters:
        - $ref: "#/components/parameters/token"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserBodyPost"
        required: true
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPostSucces"
        "403":
          description: "Forbidden"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnSuccess"
        "404":
          description: "Not Found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnSuccess"
  /updateUser:
    put:
      security:
        - BearerAuth: []
      tags:
        - user
      summary: "Add an user"
      parameters:
        - $ref: "#/components/parameters/token"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserBodyPost"
        required: true
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPostSucces"
        "403":
          description: "Forbidden"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnSuccess"
        "404":
          description: "Not Found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnSuccess"
  /deleteUser:
    delete:
      security:
        - BearerAuth: []
      tags:
        - user
      summary: Deletes an user record
      parameters:
        - $ref: "#/components/parameters/token"
        - $ref: "#/components/parameters/id"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserDeleteUser"
        required: true
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDeleteSucces"
        "403":
          description: "Forbidden"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnSuccess"
        "404":
          description: "Not Found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnSuccess"

components:
  parameters:
    token:
      name: "token"
      in: "header"
      description: "token jwt de autenticación."
      required: true
      schema:
        type: string
    id:
      name: "id"
      in: "header"
      description: "user unique id"
      required: true
      schema:
        type: integer

  schemas:
    UserBodyGet:
      type: object
      properties:
        token:
          type: string
          description: user token
    UserBodyPost:
      type: object
      properties:
        name:
          type: string
          description: username
        password:
          type: string
          description: user password
    UserSuccesGetAll:
      type: object
      properties:
        name:
          type: string
          description: username
        password:
          type: string
          description: user password
    UserDeleteUser:
      type: object
      properties:
        id:
          type: integer
          description: user id for deletion
        token:
          type: string
          description: user jwt token
    UserDeleteSucces:
      type: object
      properties:
        response:
          type: string
          description: deletion confirmation message
    UserPostSucces:
      type: object
      properties:
        id:
          type: integer
          description: new user id

    UnSuccess:
      type: object
      properties:
        message:
          type: string
          description: error message
