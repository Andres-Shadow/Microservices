openapi: '3.0.1'
info:
  title: "API Documentation"
  description: "User jwt vaildation"
  version: "1.0.0"
servers:
- url: http://localhot:9090/api/v1
tags:
  - name: user
    description: "User that can access to the system"
paths:
  /user/all: 
    get:
      tags:
        - user
      summary: "Get all users"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserBodyGet'
        required: true
      responses: 
        '200':
          description: "Success"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: '#/components/schemas/UserSuccesGetAll'
        '403':
          description: "Forbidden"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnSuccess'
        '404':
          description: "Not Found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnSuccess'
  /user/add:
    post:
      tags:
        - user
      summary: "Add an user"
      parameters:
        - $ref: '#/components/parameters/token' 
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserBodyPost'
        required: true
      responses:
        '200':
          description: "Success"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPostSucces'
        '403':
          description: "Forbidden"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnSuccess'
        '404':
          description: "Not Found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnSuccess'

components:
  parameters:
    token:
      name: "token"
      in: "header"
      description: "token jwt de autenticación."
      required: true
      schema:
        type: string

  schemas:
    UserBodyGet: 
      type: object
      properties:
        token:
          type: string
          description: user token
    UserBodyPost:
      type: object
      properties:
        name:
          type: string
          description: username
        password:
          type: string
          description: user password
    UserSuccesGetAll:
      type: object
      properties:
        name:
          type: string
          description: username
        password:
          type: string
          description: user password
    UserPostSucces:
      type: object
      properties:
        id:
          type: integer
          description: new user id
        
    UnSuccess:
      type: object
      properties:
        message:
          type: string
          description: error message
